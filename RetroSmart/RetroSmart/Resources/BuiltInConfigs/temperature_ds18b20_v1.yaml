# ESP32-S3 Zero profile:
# - keep all module wiring within GPIO1-GPIO13
# - do not rely on the onboard WS2812 on GPIO21
# - status_led assumes an optional external LED on GPIO13
schema_version: 1

module:
  type_id: temperature_ds18b20_v1
  display_name: Temperature Module
  category: sensor
  description: Temperature sensing using a DS18B20 probe over OneWire.
  manufacturer: RetroSmart
  firmware_family: retrosmart_esp32_ble_v1

identity:
  ble:
    service_uuid: "d973f2e0-71a7-4e26-a72a-4a130b83a001"
    device_type_key: temperature_ds18b20_v1
    exposes_unique_id: true

ui:
  icon_suggestions: [thermometer.medium, gauge.with.needle, switch.2]
  device_page:
    layout: controls_primary
    widgets:
      - type: reading
        id: temperature_c
        label: Temperature
        source: temperature_c
        unit: C
  settings_page:
    show_config_text: true
    show_pinout: true
    editable_fields: [custom_name, custom_icon, assigned_type]

capabilities:
  actions: []
  readings:
    - id: temperature_c
      label: Temperature
      type: float
      unit: C

automation:
  triggers: [temperature_c]
  actions: []

hardware:
  board: esp32_s3_zero
  interfaces:
    sensor_bus: onewire
  pinout:
    onewire_data: GPIO7
    status_led: GPIO13

firmware:
  transport: ble
  codegen:
    template: temperature_ds18b20
    required_libraries: [BLEDevice, ArduinoJson, OneWire, DallasTemperature]
    update_model: streaming
