# ESP32-S3 Zero profile:
# - keep all module wiring within GPIO1-GPIO13
# - do not rely on the onboard WS2812 on GPIO21
# - status_led assumes an optional external LED on GPIO13
schema_version: 1

module:
  type_id: temperature_ds18b20_v1
  display_name: Temperature Module
  category: sensor
  description: Temperature sensing using a DS18B20 probe over OneWire.
  manufacturer: RetroSmart
  firmware_family: retrosmart_esp32_ble_v1

identity:
  ble:
    service_uuid: "d973f2e0-71a7-4e26-a72a-4a130b83a001"
    device_type_key: temperature_ds18b20_v1
    exposes_unique_id: true

ui:
  icon_suggestions: [thermometer.medium, gauge.with.needle, switch.2]
  device_page:
    layout: controls_primary
    widgets:
      - type: reading
        id: temperature_c
        label: Temperature
        source: temperature_c
        unit: C
      - type: toggle
        id: display_enabled_toggle
        label: Display
        source: display_enabled
        action: set_display_enabled
        visible_when_source: display_present
        visible_when_equals: true
  settings_page:
    show_config_text: true
    show_pinout: true
    editable_fields: [custom_name, custom_icon, assigned_type]

capabilities:
  actions:
    - id: set_display_enabled
      label: Display
      kind: command
      payload:
        type: boolean
  readings:
    - id: temperature_c
      label: Temperature
      type: float
      unit: C
    - id: display_present
      label: Display Present
      type: boolean
    - id: display_enabled
      label: Display Enabled
      type: boolean

automation:
  triggers: [temperature_c]
  actions: [set_display_enabled]

hardware:
  board: esp32_s3_zero
  interfaces:
    sensor_bus: onewire
    display_bus: i2c
  pinout:
    onewire_data: GPIO6
    oled_i2c_sda: GPIO7
    oled_i2c_scl: GPIO8
    status_led: GPIO13

firmware:
  transport: ble
  codegen:
    template: temperature_ds18b20
    required_libraries: [BLEDevice, ArduinoJson, OneWire, DallasTemperature, Wire, Adafruit_GFX, Adafruit_SSD1306]
    update_model: streaming
