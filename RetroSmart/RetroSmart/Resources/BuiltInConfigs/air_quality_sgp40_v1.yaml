# RetroSmart v1 air quality bands
# This module exposes two derived values:
# - quality_score: 0-100, where higher is better
# - voc_index: normalized 0-500, used for label banding
# ESP32-S3 Zero profile:
# - keep all module wiring within GPIO1-GPIO13
# - do not rely on the onboard WS2812 on GPIO21
# - status_led assumes an optional external LED on GPIO13
schema_version: 1

module:
  type_id: air_quality_sgp40_v1
  display_name: Air Quality Module
  category: sensor
  description: Air quality sensing using SGP40 VOC index readings over I2C.
  manufacturer: RetroSmart
  firmware_family: retrosmart_esp32_ble_v1

identity:
  ble:
    service_uuid: "d973f2e0-71a7-4e26-a72a-4a130b83a001"
    device_type_key: air_quality_sgp40_v1
    exposes_unique_id: true

ui:
  icon_suggestions: [aqi.medium, wind, gauge.with.needle]
  device_page:
    layout: controls_primary
    widgets:
      - type: reading
        id: quality_score
        label: Quality Score
        source: quality_score
      - type: reading
        id: voc_index
        label: VOC Index
        source: voc_index
      - type: reading
        id: air_quality_label
        label: Air Quality
        source: air_quality_label
      - type: toggle
        id: display_enabled_toggle
        label: Display
        source: display_enabled
        action: set_display_enabled
        visible_when_source: display_present
        visible_when_equals: true
  settings_page:
    show_config_text: true
    show_pinout: true
    editable_fields: [custom_name, custom_icon, assigned_type]

capabilities:
  actions:
    - id: set_display_enabled
      label: Display
      kind: command
      payload:
        type: boolean
  readings:
    - id: quality_score
      label: Quality Score
      type: integer
    - id: voc_index
      label: VOC Index
      type: integer
    - id: air_quality_label
      label: Air Quality Label
      type: enum
      values: [Excellent, Good, Fair, Moderate, Poor, Very Poor]
    - id: display_present
      label: Display Present
      type: boolean
    - id: display_enabled
      label: Display Enabled
      type: boolean

automation:
  triggers: [quality_score, voc_index, air_quality_label]
  actions: []

hardware:
  board: esp32_s3_zero
  interfaces:
    sensor_bus: i2c
    env_sensor: sgp40
    display_bus: i2c
  pinout:
    i2c_sda: GPIO5
    i2c_scl: GPIO6
    oled_i2c_sda: GPIO7
    oled_i2c_scl: GPIO8
    status_led: GPIO13

firmware:
  transport: ble
  codegen:
    template: air_quality_sgp40
    required_libraries: [BLEDevice, ArduinoJson, Wire, Adafruit_SGP40, Adafruit_GFX, Adafruit_SSD1306]
    update_model: streaming
